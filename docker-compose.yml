version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-api
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVER_PORT: "8080"
      AUTH_DATABASE_HOST: postgres
      AUTH_DATABASE_PORT: "5432"
      AUTH_DATABASE_USER: postgres
      AUTH_DATABASE_PASSWORD: postgres
      AUTH_DATABASE_DBNAME: auth_service
      AUTH_DATABASE_SSLMODE: disable
      AUTH_REDIS_HOST: redis
      AUTH_REDIS_PORT: "6379"
      AUTH_REDIS_PASSWORD: ""
      AUTH_REDIS_DB: 0
      AUTH_JWT_ACCESS_SECRET: "change-this-to-a-secure-random-string"
      AUTH_JWT_REFRESH_SECRET: "change-this-to-another-secure-random-string"
      AUTH_APP_ENVIRONMENT: "development"
      AUTH_APP_LOG_LEVEL: "debug"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: